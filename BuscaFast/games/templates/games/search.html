{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>BuscaFast</title>
    <link rel="stylesheet" href="{% static 'searchstyle.css' %}">
</head>
<body>
    <div class="titulo">Buscar Jogos 🔍</div>

    <form method="GET" action="{% url 'search_page' %}" class="campo-de-busca">
        <input type="text" id="game_name" name="game_name" maxlength="80" placeholder="Digite o nome do jogo" required>
        <button type="submit">Buscar</button>
    </form>

    <a href="{% url 'list_page' %}" class="ver-lista">Ver minha lista</a>
    
    {% if results %}
        <div class="games-div">
            {% for game in results %}
                <div class="card">
                    {% if game.cover_url %}
                        <img src="{{ game.cover_url }}" alt="{{ game.name }}" class="capa">
                    {% endif %}
                    <div class="legendas">
                        <div class="titulo">{{ game.name }}</div>
                        <div class="nota">Nota: {{ game.rating|default:"-" }}</div>
                        <form method="GET" action="{% url 'add_to_list' %}">
                            <input type="hidden" name="game_name" value="{{ game.name }}">
                            <button type="submit" class="adicionar">Adicionar</button>
                        </form>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p>Nenhum Jogo encontrado para "{{ query }}"</p>
    {% endif %}
</body>
</html>
